<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tito ❤ Pheodora Bucket List</title>
  <style>
    * { box-sizing: border-box; font-family: 'Comic Sans MS', 'Segoe UI', sans-serif; }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f9d58, #f8bbd0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      font-size: 20px;
      animation: float 6s linear infinite;
      opacity: 0.6;
    }

    @keyframes float {
      from { transform: translateY(100vh) scale(0.5); }
      to { transform: translateY(-10vh) scale(1.2); }
    }

    .app {
      width: 95%;
      max-width: 900px;
      background: white;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      position: relative;
      z-index: 2;
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 30px;
    }

    h1 span.green { color: #0f9d58; }
    h1 span.pink { color: #e91e63; }

    .subtitle {
      text-align: center;
      font-size: 14px;
      margin-bottom: 15px;
      color: #777;
    }

    .sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .section {
      border-radius: 20px;
      padding: 15px;
      transition: transform 0.2s ease;
    }

    .section:hover { transform: scale(1.02); }

    .places { background: #e8f5e9; }
    .things { background: #fce4ec; }

    h2 { margin-top: 0; }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #ddd;
      outline: none;
      transition: 0.2s;
    }

    input:focus { border-color: #999; transform: scale(1.02); }

    button {
      border: none;
      padding: 10px 15px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.1); }

    .green-btn { background: #0f9d58; color: white; }
    .pink-btn { background: #e91e63; color: white; }

    ul { list-style: none; padding: 0; margin: 0; }

    li {
      background: white;
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    li:hover { transform: translateX(5px); }

    li.done {
      text-decoration: line-through;
      opacity: 0.6;
      background: #fafafa;
    }

    .actions button {
      padding: 5px 8px;
      font-size: 12px;
    }

    .stats {
      text-align: center;
      margin-top: 15px;
      font-size: 15px;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }

    @media (max-width: 700px) {
      .sections { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">💖</div>
  <div class="heart" style="left:25%; animation-delay:2s;">💚</div>
  <div class="heart" style="left:40%; animation-delay:4s;">✨</div>
  <div class="heart" style="left:70%; animation-delay:1s;">💖</div>
  <div class="heart" style="left:85%; animation-delay:3s;">💚</div>

  <div class="app">
    <h1>
      <span class="green">Tito</span> ❤ <span class="pink">Pheodora</span><br>
      Fun Adventure List ✨
    </h1>

    <div class="subtitle">Our cute little world of dreams 😌💚💖</div>

    <div class="sections">
      <div class="section places">
        <h2>🌍 Places to Go</h2>
        <div class="input-row">
          <input id="placeInput" placeholder="Where are we sneaking off to? 😌">
          <button class="green-btn" onclick="addItem('places')">Go ✨</button>
        </div>
        <ul id="placesList"></ul>
      </div>

      <div class="section things">
        <h2>💖 Things to Do</h2>
        <div class="input-row">
          <input id="thingInput" placeholder="What fun chaos are we causing? 😌">
          <button class="pink-btn" onclick="addItem('things')">Do ✨</button>
        </div>
        <ul id="thingsList"></ul>
      </div>
    </div>

    <div class="stats" id="stats"></div>
    <div class="footer">Made with love & soft drama 💅✨</div>
  </div>

  <script>
    const storageKey = 'couple_bucket_list';

    let data = JSON.parse(localStorage.getItem(storageKey)) || {
      places: [],
      things: []
    };

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(data));
      render();
    }

    function addItem(type) {
      const input = document.getElementById(type === 'places' ? 'placeInput' : 'thingInput');
      const value = input.value.trim();
      if (!value) return;

      data[type].push({ text: value, done: false });
      input.value = '';
      save();
    }

    function toggle(type, index) {
      data[type][index].done = !data[type][index].done;
      save();
    }

    function removeItem(type, index) {
      data[type].splice(index, 1);
      save();
    }

    function renderList(type, elementId, colorClass) {
      const list = document.getElementById(elementId);
      list.innerHTML = '';

      data[type].forEach((item, index) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        li.innerHTML = `
          <span>${item.text}</span>
          <div class="actions">
            <button class="${colorClass}" onclick="toggle('${type}', ${index})">
              ${item.done ? 'Undo 😌' : 'Done ✨'}
            </button>
            <button onclick="removeItem('${type}', ${index})">✖</button>
          </div>
        `;

        list.appendChild(li);
      });
    }

    function renderStats() {
      const totalPlaces = data.places.length;
      const visitedPlaces = data.places.filter(p => p.done).length;

      const totalThings = data.things.length;
      const doneThings = data.things.filter(t => t.done).length;

      const completed = visitedPlaces + doneThings;
      const total = totalPlaces + totalThings;

      document.getElementById('stats').innerText =
        `✨ Completed Adventures: ${completed} | Dreams Loading: ${total - completed} ✨`;
    }

    function render() {
      renderList('places', 'placesList', 'green-btn');
      renderList('things', 'thingsList', 'pink-btn');
      renderStats();
    }

    render();
  </script>
</body>
</html>
